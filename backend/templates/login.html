{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>User Login - EventNest</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-body">

<a href="{% url 'home' %}" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back
</a>

<div class="login-logo">
    <i class="fa-solid fa-feather-pointed"></i> EventNest
</div>

<div class="login-box">
    <h2>User Login</h2>
    <p class="subtitle">Welcome back! Please login to continue</p>

    <form method="POST" action="{% url 'user_login' %}">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <button type="submit">Login</button>
    </form>

    <p class="register-link" style="margin-bottom: 5px;">
        <a href="{% url 'forgot_password' %}">Forgot Password?</a>
    </p>

    <p class="register-link">
        New user?
        <a href="{% url 'register' %}">Register here</a>
    </p>
</div>

</body>
</html>
