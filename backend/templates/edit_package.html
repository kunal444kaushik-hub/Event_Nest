{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Package - {{ package.package_name }}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #fdfdfd; font-family: 'Inter', sans-serif;">
<a href="{% url 'provider_dashboard' %}" class="back-btn" style="position: absolute; top: 25px; left: 25px; z-index: 100;">
    <i class="fa-solid fa-arrow-left"></i> Cancel
</a>

<div class="creation-container" style="max-width: 800px; margin: 60px auto; padding: 40px; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.05);">
    <h1 style="margin-bottom: 30px;">Edit Package</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="input-group" style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:700;">Package Name</label>
            <input type="text" name="package_name" value="{{ package.package_name }}" style="width:100%; padding:14px; border-radius:12px; border:2px solid #f0f0f0;" required>
        </div>
        
        <div class="input-group" style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:700;">Package Type</label>
            <select name="package_type" style="width:100%; padding:14px; border-radius:12px; border:2px solid #f0f0f0;">
                <option value="Birthday Package" {% if package.package_type == 'Birthday Package' %}selected{% endif %}>Birthday Package</option>
                <option value="Marriage Package" {% if package.package_type == 'Marriage Package' %}selected{% endif %}>Marriage Package</option>
                <option value="Engagement Package" {% if package.package_type == 'Engagement Package' %}selected{% endif %}>Engagement Package</option>
                <option value="Custom Combo Package" {% if package.package_type == 'Custom Combo Package' %}selected{% endif %}>Custom Combo Package</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="input-group">
                <label style="display:block; margin-bottom:8px; font-weight:700;">Total Price (₹)</label>
                <input type="number" name="total_price" value="{{ package.total_price }}" style="width:100%; padding:14px; border-radius:12px; border:2px solid #f0f0f0;" required>
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom:8px; font-weight:700;">Pricing Structure</label>
                <input type="text" name="pricing_structure" value="{{ package.pricing_structure }}" placeholder="e.g. Per Event, Per Day" style="width:100%; padding:14px; border-radius:12px; border:2px solid #f0f0f0;">
            </div>
        </div>

        <div class="input-group" style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:700;">Included Services</label>
            <textarea name="included_services" rows="3" style="width:100%; padding:14px; border-radius:12px; border:2px solid #f0f0f0;">{{ package.included_services }}</textarea>
        </div>

        <div class="input-group" style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:700;">Description</label>
            <textarea name="description" rows="4" style="width:100%; padding:14px; border-radius:12px; border:2px solid #f0f0f0;">{{ package.description }}</textarea>
        </div>

        <div class="input-group" style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:700;">Max Guests</label>
            <input type="number" name="max_guests" value="{{ package.max_guests }}" style="width:100%; padding:14px; border-radius:12px; border:2px solid #f0f0f0;">
        </div>

        <div class="input-group" style="margin-bottom: 30px;">
            <label style="display:block; margin-bottom:8px; font-weight:700;">Cover Photo (Leave blank to keep current)</label>
            <input type="file" name="image" accept="image/*" style="width:100%; padding:10px;">
            {% if package.image %}
                <div style="margin-top:10px;">
                    <img src="{{ package.image.url }}" style="height:100px; border-radius:10px;">
                </div>
            {% endif %}
        </div>

        <button type="submit" style="width:100%; padding:18px; background:#ff6600; color:white; border:none; border-radius:15px; font-weight:800; font-size:1.1rem; cursor:pointer; transition:0.3s;">Update Package</button>
    </form>
</div>
</body>
</html>
