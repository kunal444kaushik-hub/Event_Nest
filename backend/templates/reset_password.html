{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Reset Password - EventNest</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-body">
<a href="#" onclick="history.back()" class="back-btn">
  <i class="fa-solid fa-arrow-left"></i> Back
</a>

<div class="login-logo">
    <i class="fa-solid fa-feather-pointed"></i> EventNest
</div>

<div class="login-box">
  <h2>Reset Password</h2>
  <p class="subtitle">Enter your new secure password</p>

  <form method="POST">
    {% csrf_token %}

    <div class="password-container">
        <input type="password" name="password" id="password" placeholder="New Password" required>
        <i class="fa-solid fa-eye toggle-password" onclick="togglePass('password', this)"></i>
    </div>

    <div class="password-container">
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
        <i class="fa-solid fa-eye toggle-password" onclick="togglePass('confirm_password', this)"></i>
    </div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <button type="submit">Reset Password</button>
  </form>
</div>

<script>
    function togglePass(id, el) {
        const password = document.getElementById(id);
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        el.classList.toggle('fa-eye-slash');
    }
</script>

</body>
</html>
