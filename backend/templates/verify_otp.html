{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP - EventNest</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-body">

<button class="back-btn" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Back
</button>

<div class="login-logo">
    <i class="fa-solid fa-feather-pointed"></i> EventNest
</div>

<div class="login-box">
    <div class="reg-steps">
        <div class="step-dot active"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
    </div>

    <h2>Verify Email</h2>
    <p class="subtitle">Enter the 6-digit code sent to your email</p>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="otp" placeholder="6-Digit OTP" maxlength="6" required style="text-align: center; letter-spacing: 10px; font-size: 1.5rem;">

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <button type="submit">Verify OTP</button>
    </form>

    <p class="register-link">
        Didn't receive code? 
        <a href="#" onclick="location.reload()">Resend</a>
    </p>
</div>

</body>
</html>
