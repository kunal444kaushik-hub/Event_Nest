{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>User Register - EventNest</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-body">

<a href="{% url 'user_login' %}" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back
</a>

<div class="login-logo">
    <i class="fa-solid fa-feather-pointed"></i> EventNest
</div>

<div class="login-box">
    <div class="reg-steps">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
    </div>

    <h2>Create Account</h2>
    <p class="subtitle">Enter your email to start registration</p>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Email Address" required>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <button type="submit">Continue <i class="fa-solid fa-arrow-right"></i></button>
    </form>

    <p class="register-link">
        Already have an account?
        <a href="{% url 'user_login' %}">Login</a>
    </p>
</div>

</body>
</html>
