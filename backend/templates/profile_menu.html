{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Profile Menu - EventNest</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="profile-body">

<a href="{% url 'user_home' %}" class="back-btn">← Back</a>

<div class="profile-card">
  <h2>Welcome {{ request.user.username }}</h2>

  <a href="{% url dashboard_url %}" class="profile-btn">Dashboard</a>
  <a href="{% url 'my_profile' %}" class="profile-btn">My Profile</a>
  <a href="{% url 'settings' %}" class="profile-btn">Settings</a>
  <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
</div>

</body>
</html>
